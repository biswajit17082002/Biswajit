<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>শুভ হোলি — Biswajit Biswas</title>
  <meta name="theme-color" content="#111827" />
  <style>
    :root{
      --card: rgba(255,255,255,.10);
      --stroke: rgba(255,255,255,.18);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; overflow:hidden;
      background:
        radial-gradient(900px 700px at 15% 10%, rgba(79,70,229,.35), transparent 60%),
        radial-gradient(900px 700px at 85% 20%, rgba(236,72,153,.30), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(34,197,94,.25), transparent 60%),
        linear-gradient(160deg,#050816,#0b1020);
      color:var(--text);
    }

    .card{
      width:min(560px,92vw);
      border-radius:24px;
      padding:22px;
      background:var(--card);
      border:1px solid var(--stroke);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      position:relative;
    }

    .top{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom:14px;
    }

    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.14);
      font-weight:700;
      letter-spacing:.2px;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(90deg,#ff4d4d,#ffcc00,#3cff79,#4db6ff,#b64dff);
      box-shadow: 0 0 18px rgba(255,255,255,.35);
    }

    h1{margin:8px 0 6px; font-size:28px; line-height:1.15}
    p{margin:0 0 14px; color:var(--muted); line-height:1.5}

    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    input{
      flex:1; min-width:210px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
    }
    input::placeholder{color:rgba(255,255,255,.55)}

    .btn{
      border:none; cursor:pointer;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      color:#111;
      background: linear-gradient(90deg,#ff4d4d,#ffcc00,#3cff79,#4db6ff,#b64dff);
      transition: transform .08s ease;
      white-space:nowrap;
    }
    .btn:active{transform: scale(.98)}

    .btnGhost{
      border:1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.18);
      color:var(--text);
    }

    .msg{
      margin-top:16px;
      padding:14px;
      border-radius:18px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.14);
      display:none;
    }
    .msg.show{display:block}
    .big{font-size:28px;font-weight:900;margin:0 0 6px}
    .small{margin:0; color:var(--muted)}

    .footer{
      margin-top:14px;
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      flex-wrap:wrap;
      font-size:12px; color:rgba(255,255,255,.65);
    }
    .owner{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
    }

    canvas{position:fixed; inset:0; pointer-events:none}
  </style>
</head>
<body>

  <canvas id="fx"></canvas>

  <div class="card">
    <div class="top">
      <div class="badge"><span class="dot"></span> হোলি শুভেচ্ছা লিংক</div>
      <button class="btn btnGhost" id="musicBtn">🔊 গান চালু</button>
    </div>

    <h1>🎨 শুভ হোলি শুভেচ্ছা</h1>
    <p>আপনার নাম লিখুন, রঙিন শুভেচ্ছা পান, তারপর WhatsApp-এ শেয়ার করুন।</p>

    <div class="row">
      <input id="name" placeholder="আপনার নাম লিখুন (যেমন: Maitree)" maxlength="30" />
      <button class="btn" id="go">শুভেচ্ছা দেখুন</button>
    </div>

    <div id="out" class="msg">
      <p class="big" id="title">শুভ হোলি! 🎉</p>
      <p class="small" id="subtitle">রঙে-রঙে ভরে উঠুক আপনার জীবন—আনন্দ ও সুখে ✨</p>

      <div class="row" style="margin-top:12px">
        <button class="btn" id="shareBtn">📲 WhatsApp-এ শেয়ার</button>
        <button class="btn btnGhost" id="copyBtn">🔗 লিংক কপি</button>
      </div>
    </div>

    <div class="footer">
      <span>টিপ: এভাবে শেয়ার করুন <b>?name=আপনারনাম</b></span>
      <span class="owner">Created by ❤️ Biswajit Biswas</span>
    </div>
  </div>

  <!-- Music (change to your mp3 if you want: holi.mp3) -->
  <audio id="music" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const input = document.getElementById("name");
    const out = document.getElementById("out");
    const title = document.getElementById("title");

    function setGreeting(n){
      const clean = (n || "").trim();
      if(!clean) return;
      title.textContent = `🌈 শুভ হোলি, ${clean}! 🎉`;
      out.classList.add("show");
      burst();

      const url = new URL(location.href);
      url.searchParams.set("name", clean);
      history.replaceState({}, "", url.toString());
    }

    document.getElementById("go").addEventListener("click", () => setGreeting(input.value));
    input.addEventListener("keydown", (e) => { if(e.key === "Enter") setGreeting(input.value); });

    const params = new URLSearchParams(location.search);
    if(params.get("name")){
      const n = params.get("name");
      input.value = n;
      setGreeting(n);
    }

    // WhatsApp Share (Bengali)
    document.getElementById("shareBtn").addEventListener("click", () => {
      const n = (input.value || params.get("name") || "").trim() || "বন্ধু";
      const link = location.href;
      const text =
`🌈 শুভ হোলি, ${n}! 🎉
আপনার জীবন রঙে-রঙে ভরে উঠুক—আনন্দ ও সুখে ✨

লিংক খুলুন: ${link}

— Created by Biswajit Biswas`;
      window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
    });

    // Copy Link
    document.getElementById("copyBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(location.href);
        alert("লিংক কপি হয়েছে ✅");
      }catch(e){
        prompt("এই লিংক কপি করুন:", location.href);
      }
    });

    // Music button
    const music = document.getElementById("music");
    const musicBtn = document.getElementById("musicBtn");
    let playing = false;

    musicBtn.addEventListener("click", async () => {
      try{
        if(!playing){
          await music.play();
          playing = true;
          musicBtn.textContent = "⏸️ গান বন্ধ";
        }else{
          music.pause();
          playing = false;
          musicBtn.textContent = "🔊 গান চালু";
        }
      }catch(err){
        alert("মোবাইলে গান চালাতে হলে আবার ট্যাপ করুন।");
      }
    });

    // Confetti / Color Splash
    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    function resize(){
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
    }
    addEventListener("resize", resize); resize();

    const colors = ["#ff4d4d","#ffcc00","#3cff79","#4db6ff","#b64dff","#ff62d6"];
    let particles = [];

    function burst(){
      const count = 150;
      const cx = (innerWidth/2) * devicePixelRatio;
      const cy = (innerHeight/2) * devicePixelRatio;
      for(let i=0;i<count;i++){
        const a = Math.random()*Math.PI*2;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(a) * (Math.random()*10+4) * devicePixelRatio,
          vy: Math.sin(a) * (Math.random()*10+4) * devicePixelRatio,
          r: Math.random()*7+5,
          c: colors[(Math.random()*colors.length)|0],
          life: 80 + (Math.random()*60|0)
        });
      }
    }

    function tick(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles = particles.filter(p => p.life-- > 0);
      for(const p of particles){
        p.vy += 0.22 * devicePixelRatio;
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.985; p.vy *= 0.985;

        ctx.beginPath();
        ctx.fillStyle = p.c;
        ctx.globalAlpha = Math.max(0, p.life/140);
        ctx.arc(p.x, p.y, p.r*devicePixelRatio, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
